name: Daily prediction update
on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Inject timestamp
        run: |
          TIMESTAMP=$(TZ="Europe/Berlin" date "+%d %b %Y %H:%M CET")
          sed -i "s|LAST_UPDATED_PLACEHOLDER|${TIMESTAMP}|g" index.html
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Daily update: $(TZ='Europe/Berlin' date '+%d %b %Y %H:%M CET')" && git push
